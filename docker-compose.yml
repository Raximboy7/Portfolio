# ============================================================================
#  docker compose up --build   ->  http://localhost:8000
#  Productionda: serverdagi nginx ni 127.0.0.1:8000 ga proxy qiling (README).
# ============================================================================
services:
  web:
    build: .
    image: ibrohimov-dev-portfolio
    container_name: ibrohimov_dev_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # SQLite fayli volume ichida saqlanadi (qayta ishga tushganda yo'qolmaydi)
      SQLITE_PATH: /app/data/db.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sqlite_data:
